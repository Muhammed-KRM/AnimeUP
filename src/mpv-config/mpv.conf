# ╔══════════════════════════════════════════════════════════════════╗
# ║            AnimeUP — MPV Ana Yapılandırma Dosyası               ║
# ║  Bu dosya, AnimeUP Installer tarafından %APPDATA%\mpv           ║
# ║  dizinine kopyalanarak MPV'nin bu ayarlarla çalışması sağlanır.  ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Render Altyapısı ve Donanım Hızlandırma ────────────────────────
# gpu-next: MPV'nin modern render API'si. Shader desteği için zorunlu.
vo=gpu-next

# GPU API Fallback Sırası: Vulkan > D3D11 > OpenGL
# MPV, listedeki ilk uyumlu API'yi otomatik seçer.
gpu-api=vulkan

# hwdec=auto-safe: Desteklenen donanım hızlandırmayı güvenle etkinleştirir.
# (DXVA2/D3D11VA/NVDEC/CUVID/VAAPI vb.) — crash yaratmayan güvenli mod.
hwdec=auto-safe

# ─── Yüksek Kaliteli Yazılım Ölçeklendirme Algoritmaları ────────────
# Anime4K kapalıyken bile MPV, EWA Lanczos ile keskin görüntü verir.
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
linear-downscaling=no
correct-downscaling=yes

# ─── Online Stream Akışı için Cache ve Buffer Ayarları ──────────────
# Düşük bant genişliğinde veya yüksek gecikmeli bağlantılarda donmayı önler.
cache=yes
cache-secs=300
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=50MiB
network-timeout=30

# ─── Ekran ve Renk Yönetimi ─────────────────────────────────────────
video-sync=display-resample
interpolation=yes
tscale=oversample

# ─── Ses Ayarları ───────────────────────────────────────────────────
volume=100
audio-pitch-correction=yes

# ─── OSD ve Arayüz ──────────────────────────────────────────────────
# osc=no → uosc kendi arayüzünü çizeceği için varsayılan OSC devre dışı.
osc=no

# OSD level: 1 → Sadece temel bilgileri göster (seek progress vb.)
osd-level=1
osd-font-size=36
osd-color='#FFFFFFFF'
osd-border-color='#FF000000'

# ─── Pencere Ayarları ───────────────────────────────────────────────
# border=no → uosc pencere çerçevesini kendisi çizer.
border=no
keep-open=yes
