# ╔══════════════════════════════════════════════════════════════════╗
# ║           AnimeUP — uosc Arayüz Yapılandırması                  ║
# ║  Dosya: mpv-config/script-opts/uosc.conf                        ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Genel Görünüm ───────────────────────────────────────────────────
# Zaman çubuğu stili: line (ince) veya bar (kalın)
timeline_style=bar
timeline_size=32
timeline_size_min=6
timeline_size_max=32

# Zaman çubuğunu her zaman görünür kıl (YouTube stili)
timeline_persistency=always

# Kontrol elemanlarının konumu: top veya bottom
controls=bottom

# Geçiş animasyonu süresi (ms)
animation_duration=100

# ─── Renkler (AnimeUP Mavi Teması) ──────────────────────────────────
color=foreground=ffffff,foreground_text=000000,background=000000,background_text=ffffff,curtain=000000,success=3b82f6,error=ef4444

# ─── Kontrol Elemanları Yapılandırması ──────────────────────────────
# Hangi kontrol butonlarının görüneceğini ve sırasını belirler
controls=menu,gap,subtitles,<has_many_audio>audio,<has_many_video>video,<has_many_chapter>chapters,gap,speed,spacer,shuffle,loop-playlist,loop-file,gap,prev,items,next,gap,fullscreen

# ─── İkon Boyutları ──────────────────────────────────────────────────
font_height_to_icon_ratio=2.5

# ─── Zaman Damgası ───────────────────────────────────────────────────
# Kaç saniyede bir mevcut zaman/süre bilgisi güncellenir
autohide_timeline_when_no_video=yes
