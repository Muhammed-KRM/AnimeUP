# ╔══════════════════════════════════════════════════════════════════╗
# ║          AnimeUP — MPV Klavye Kısayol Yapılandırması            ║
# ║  Anime4K shader profil geçişleri ve uosc menü tetikleyicileri   ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Anime4K Shader Profil Geçişleri ────────────────────────────────

# CTRL+1 → Mode A: SD/HD → 4K (En güçlü upscale, yüksek GPU kullanımı)
CTRL+1 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl;~~/shaders/Anime4K_Restore_CNN_VL.glsl;~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl;~~/shaders/Anime4K_AutoDownscalePre_x2.glsl;~~/shaders/Anime4K_AutoDownscalePre_x4.glsl;~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"; show-text "AnimeUP: Mode A — SD/HD → 4K Aktif" #! Yapay Zeka (Anime4K) > Mod A (Keskin Upscale)

# CTRL+2 → Mode B: HD → 4K (Yumuşatılmış detay restorasyonu)
CTRL+2 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl;~~/shaders/Anime4K_Restore_CNN_Soft_VL.glsl;~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl;~~/shaders/Anime4K_AutoDownscalePre_x2.glsl;~~/shaders/Anime4K_AutoDownscalePre_x4.glsl;~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"; show-text "AnimeUP: Mode B — HD Soft Restore Aktif" #! Yapay Zeka (Anime4K) > Mod B (Yumuşak - Doğal Renkler)

# CTRL+3 → Mode C: Gürültü giderme + Upscale (Bant genişliği sıkıştırmalı kaynaklar için)
CTRL+3 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl;~~/shaders/Anime4K_Restore_CNN_VL.glsl;~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl;~~/shaders/Anime4K_AutoDownscalePre_x2.glsl;~~/shaders/Anime4K_AutoDownscalePre_x4.glsl;~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"; show-text "AnimeUP: Mode C — Denoise + Upscale Aktif" #! Yapay Zeka (Anime4K) > Mod C (Gürültü Giderme)

# CTRL+0 → Tüm shader'ları kapat
CTRL+0 no-osd change-list glsl-shaders clr ""; show-text "AnimeUP: Shader KAPALI" #! Yapay Zeka (Anime4K) > Yapay Zekayı Kapat

# ─── uosc Menü Tetikleyicileri ──────────────────────────────────────
# Sağ tık → uosc bağlam menüsü
MBTN_RIGHT script-binding uosc/menu

# ─── Ek Kısayollar ──────────────────────────────────────────────────
# F → Tam ekran geçişi
f cycle fullscreen

# Boşluk → Durdur/Devam
SPACE cycle pause

# Sağ/Sol ok → 5 saniye ileri/geri
RIGHT seek 5
LEFT seek -5

# Shift+Sağ/Sol → 30 saniye ileri/geri (bölüm atlamak için)
Shift+RIGHT seek 30
Shift+LEFT seek -30

# Yukarı/Aşağı ok → Ses
UP add volume 5
DOWN add volume -5

# Q → Çıkış
q quit
